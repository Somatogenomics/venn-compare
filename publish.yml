name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::bslib

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        
      - name: Install R render dependencies
        run: |
          Rscript -e 'install.packages(c("knitr", "rmarkdown", "shiny", "bslib", "jsonlite", "shinylive"), repos = "https://cloud.r-project.org")'
          Rscript -e 'cat("knitr:", as.character(packageVersion("knitr")), "\n")'
          Rscript -e 'cat("rmarkdown:", as.character(packageVersion("rmarkdown")), "\n")'
      - name: Install Shinylive extension
        run: |
          quarto add quarto-ext/shinylive --no-prompt

      - name: Render
        run: quarto render index.qmd

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Inspect rendered site
        run: |
          echo "Files in _site:"
          find _site -maxdepth 3 -type f | sort | head -100

          echo "Search for shinylive in rendered HTML:"
          grep -n "shinylive" _site/index.html | head -30 || true

          echo "Search for app code in rendered HTML:"
          grep -n "VennCompare v2" _site/index.html | head -10 || true
          grep -n "shinyApp" _site/index.html | head -10 || true

          echo "Size of rendered HTML:"
          ls -lh _site/index.html
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
